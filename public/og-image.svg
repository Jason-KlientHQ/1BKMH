<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="space" cx="50%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#141838"/>
      <stop offset="55%" stop-color="#080a1a"/>
      <stop offset="100%" stop-color="#04050c"/>
    </radialGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe9a8"/>
      <stop offset="55%" stop-color="#f7b733"/>
      <stop offset="100%" stop-color="#e8890c"/>
    </radialGradient>
    <linearGradient id="head" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0%" stop-color="#ffe6a3"/>
      <stop offset="50%" stop-color="#fdf6e8"/>
      <stop offset="100%" stop-color="#9af0dc"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#space)"/>
  <g fill="#fdf6e8">
    <circle cx="140" cy="90" r="1.6" opacity="0.7"/>
    <circle cx="320" cy="160" r="1.2" opacity="0.5"/>
    <circle cx="1040" cy="120" r="1.8" opacity="0.8"/>
    <circle cx="980" cy="320" r="1.3" opacity="0.6"/>
    <circle cx="1120" cy="470" r="1.5" opacity="0.7"/>
    <circle cx="80" cy="420" r="1.4" opacity="0.6"/>
    <circle cx="240" cy="520" r="1.2" opacity="0.5"/>
    <circle cx="760" cy="70" r="1.3" opacity="0.55"/>
  </g>
  <g transform="translate(900,315)">
    <circle r="190" fill="none" stroke="#f7b733" stroke-opacity="0.2" stroke-width="2" stroke-dasharray="4 10"/>
    <circle r="64" fill="url(#sun)"/>
    <circle cx="190" cy="0" r="11" fill="#2fe0c0"/>
    <circle cx="190" cy="0" r="22" fill="#2fe0c0" opacity="0.22"/>
  </g>
  <text x="90" y="250" font-family="Space Grotesk, sans-serif" font-size="34" letter-spacing="8" fill="#f7b733" opacity="0.85">BIRTHDAY LIGHT JOURNEY</text>
  <text x="86" y="350" font-family="Space Grotesk, sans-serif" font-weight="700" font-size="92" fill="url(#head)">How far has your</text>
  <text x="86" y="450" font-family="Space Grotesk, sans-serif" font-weight="700" font-size="92" fill="url(#head)">light traveled?</text>
  <text x="90" y="520" font-family="Sora, sans-serif" font-size="28" fill="#9aa3c4">A beam circling the Sun every birthday of your life — mapped across the nearest stars.</text>
</svg>
